<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeypot Bot Dashboard</title>
    <style>
        body {
            background-color: #23272a;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .stat-box {
            background-color: #2c2f33;
            padding: 20px;
            border-radius: 8px;
            width: 150px;
            border: 1px solid #5865F2;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #5865F2;
        }
        .invite-btn {
            background-color: #5865F2;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <h1>Honeypot Bot Live Dashboard</h1>
    <p>Real-time protection statistics across protected servers.</p>

    <div class="dashboard">
        <div class="stat-box">
            <h3>Kicked</h3>
            <div class="stat-number" id="kicked-count">0</div>
        </div>
        <div class="stat-box">
            <h3>Banned</h3>
            <div class="stat-number" id="banned-count">0</div>
        </div>
    </div>
    
    <a href="YOUR_BOT_INVITE_LINK" class="invite-btn">Invite Bot</a>

    <script>
        // Function to grab stats from the backend server
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('kicked-count').innerText = data.kicked;
                document.getElementById('banned-count').innerText = data.banned;
            } catch (error) {
                console.error("Error fetching stats:", error);
            }
        }

        // Update stats immediately on load, then every 10 seconds
        updateStats();
        setInterval(updateStats, 10000);
    </script>
</body>
</html>
