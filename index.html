<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeypot Security Dashboard</title>
    <style>
        /* Modern CSS Variables for Easy Customization */
        :root {
            --bg-main: #0f1115;
            --bg-card: #181c25;
            --accent-blue: #5865F2;
            --accent-glow: rgba(88, 101, 242, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #949ba4;
            --danger-red: #f23f43;
            --danger-glow: rgba(242, 63, 67, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container Card */
        .container {
            background-color: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
        }

        /* Profile & Logo Section */
        .logo-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px auto;
        }

        .bot-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--accent-blue);
            border: 3px solid var(--accent-blue);
            box-shadow: 0 0 20px var(--accent-glow);
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
        }

        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background-color: #23a55a;
            border: 4px solid var(--bg-card);
            border-radius: 50%;
        }

        /* Typography */
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        /* Statistics Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 35px;
        }

        .stat-box {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .stat-box:hover {
            border-color: var(--accent-blue);
            background-color: rgba(88, 101, 242, 0.03);
        }

        .stat-box.danger:hover {
            border-color: var(--danger-red);
            background-color: rgba(242, 63, 67, 0.03);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-blue);
            transition: color 0.2s ease;
        }

        .stat-box.danger .stat-number {
            color: var(--danger-red);
        }

        /* Action Button */
        .invite-btn {
            display: block;
            width: 100%;
            background-color: var(--accent-blue);
            color: var(--text-primary);
            padding: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3);
            transition: all 0.2s ease;
        }

        .invite-btn:hover {
            background-color: #4752c4;
            box-shadow: 0 6px 20px var(--accent-glow);
            transform: translateY(-1px);
        }

        .invite-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="🐝" class="bot-logo" onerror="this.onerror=null; this.src=''; this.innerHTML='🐝';">
            <div class="status-dot"></div>
        </div>

        <h1>Honeypot Shield</h1>
        <p class="description">Real-time anti-bot protection monitoring and system logs for protected servers.</p>

        <div class="dashboard-grid">
            <div class="stat-box">
                <div class="stat-label">Total Kicked</div>
                <div class="stat-number" id="kicked-count">0</div>
            </div>
            <div class="stat-box danger">
                <div class="stat-label">Total Banned</div>
                <div class="stat-number" id="banned-count">0</div>
            </div>
        </div>
        
        <a href="https://discord.com/oauth2/authorize?client_id=1503472375327490149" class="invite-btn" target="_blank">Invite Bot to Server</a>
    </div>

    <script>
        // Real-time server statistics tracking
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                if (!response.ok) throw new Error('Network status error');
                const data = await response.json();
                
                document.getElementById('kicked-count').innerText = data.kicked ?? 0;
                document.getElementById('banned-count').innerText = data.banned ?? 0;
            } catch (error) {
                console.error("Dashboard synchronization error:", error);
            }
        }

        // Initialize and refresh metrics dynamically
        updateStats();
        setInterval(updateStats, 10000);
    </script>
</body>
</html>
